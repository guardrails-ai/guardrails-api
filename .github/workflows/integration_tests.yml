name: Integration Tests

on:
    push:
      branches:
        - main
      paths:
        - guardrails_api/**
        - pyproject.toml
    workflow_dispatch:

jobs:
    build-test-server-w-config:
        runs-on: ubuntu-latest
        steps:
            - name: Check out head
              uses: actions/checkout@v5
              with:
                persist-credentials: false

            - name: Set up QEMU
              uses: docker/setup-qemu-action@master
              with:
                platforms: linux/amd64

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@master
              with:
                platforms: linux/amd64

            - name: Build Docker image
              uses: docker/build-push-action@v6
              continue-on-error: false
              with:
                context: .
                file: integration_tests/Dockerfile
                platforms: linux/amd64
                push: false
                tags: guardrails-api:integration-tests
                load: true
                build-args: |
                  GUARDRAILS_TOKEN=${{ secrets.GUARDRAILS_API_KEY }}

            - name: Start Docker container
              continue-on-error: false
              run: |
                  docker run -d --name guardrails-server -p 8000:8000 -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} guardrails-api:integration-tests
        
            - name: Wait for Docker container to be ready
              continue-on-error: false
              run: |
                up="F"
                for i in {1..30}; do
                if docker exec guardrails-server curl -s http://localhost:8000/; then
                    echo "Server is up!"
                    up="T"
                    break
                fi
                echo "Waiting for server..."
                if [ i == 30 ]; then
                  echo "docker container logs: "
                  docker logs guardrails-server
                fi
                sleep 5
                done

                if [ "T" != "${up}" ];
                    then
                        echo "Server never started!"
                        exit 1
                fi
    
            - name: Run Pytest
              continue-on-error: false
              run: |
                pip install pytest pytest-asyncio openai ".[api]"
                pytest integration_tests/tests
                docker stop guardrails-server
                docker rm guardrails-server